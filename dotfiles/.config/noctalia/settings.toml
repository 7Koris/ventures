[audio]
enable_sounds = true

[bar]
order = [ "main" ]

    [bar.main]
    background_opacity = 0.0
    capsule_groups = [ "left", "right" ]
    center = [ "audio_visualizer" ]
    color = "tertiary"
    enabled = true
    end = [
        "tray",
        "notifications",
        "clipboard",
        "network",
        "bluetooth",
        "volume",
        "brightness",
        "battery",
        "clock",
        "session"
    ]
    font_weight = 600
    margin_edge = 4
    scale = 1.25
    shadow = false
    start = [ "launcher", "control-center", "wallpaper", "workspaces" ]

[desktop_widgets]
enabled = false
schema_version = 1
widget_order = [ "desktop-widget-0000000000000001" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    cx = 1763.5
    cy = 48.5
    output = "HDMI-A-1"
    rotation = 0.0
    scale = 1.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        color = "tertiary"
        shadow = false

[shell]
corner_radius_scale = 2.0
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = false

    [shell.animation]
    speed = 2.0

    [shell.panel]
    borders = false
    control_center_placement = "floating"
    open_near_click_control_center = true
    open_near_click_wallpaper = true
    shadow = false
    wallpaper_placement = "centered"

    [shell.screen_corners]
    size = 100

[theme]
community_palette = "Rosey AMOLED"
mode = "dark"

    [theme.templates]
    builtin_ids = [ "starship", "gtk3", "gtk4", "btop", "kitty", "niri", "qt" ]
    community_ids = [ "spicetify", "vscode", "discord", "steam", "yazi", "zen-browser" ]

[wallpaper]
directory = "/home/user/Pictures/Wallpapers"
transition = [ "disc", "fade", "honeycomb", "stripes", "wipe", "zoom" ]

    [wallpaper.default]
    path = "/home/user/Pictures/Wallpapers/default.png"

    [wallpaper.last]
    path = "/home/user/Pictures/Wallpapers/default.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/user/Pictures/Wallpapers/default.png"

[weather]
auto_locate = true

[widget.audio_visualizer]
anchor = true
bands = 46
high_color = "tertiary"
width = 400.0

[widget.battery]
capsule_group = "right"

[widget.bluetooth]
capsule_group = "right"

[widget.bongocat]
script = "scripts/bongocat.lua"
type = "scripted"

[widget.brightness]
capsule_group = "right"

[widget.clipboard]
capsule_group = "right"

[widget.clock]
capsule_group = "right"
color = "secondary"

[widget.control-center]
capsule_group = "left"
glyph = "home-filled"

[widget.launcher]
capsule_group = "left"
color = "tertiary"

[widget.media]
art_size = 53.0
color = "primary"
max_length = 282.0
title_scroll = "on_hover"

[widget.network]
capsule_group = "right"
show_label = false

[widget.notifications]
capsule_group = "right"

[widget.session]
capsule_group = "right"

[widget.tray]
capsule_group = "right"
color = "secondary"
drawer = true

[widget.volume]
capsule_group = "right"
show_label = false

[widget.wallpaper]
capsule_group = "left"

[widget.workspaces]
capsule_group = "left"